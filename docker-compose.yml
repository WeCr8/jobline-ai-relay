version: '3.9'
services:
  relay:
    build: .
    container_name: jobline-relay
    ports:
      - "4242:4242"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:4242/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
